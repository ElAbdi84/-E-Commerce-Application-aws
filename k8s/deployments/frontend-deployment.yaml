apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: default
  labels:
    app: frontend
    tier: web
    project: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: frontend
        image: 714454206137.dkr.ecr.us-east-1.amazonaws.com/ecommerce-frontend:latest  # ← Remplacez VOTRE_ACCOUNT_ID
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        
        env:
        - name: REACT_APP_API_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REACT_APP_API_URL
        
        # Health Check (Nginx)
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        
        # Resource Limits (optimisés pour t3.small)
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

# INSTRUCTIONS :
# 1. Remplacez VOTRE_ACCOUNT_ID dans l'URL de l'image
#
# 2. Vérifiez que l'image existe dans ECR :
#    aws ecr describe-images --repository-name ecommerce-frontend --region us-east-1
#
# 3. Appliquer :
#    kubectl apply -f k8s/deployments/frontend-deployment.yaml