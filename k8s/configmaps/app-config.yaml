apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
data:
  # Configuration commune
  NODE_ENV: "production"
  AWS_REGION: "us-east-1"
  
  # S3
  S3_BUCKET_NAME: "ecommerce-products-2026-pfe"  
  
  # SQS (sera créé en Partie 7 - laissez vide pour l'instant)
  SQS_QUEUE_URL: ""
  
  # Backend
  BACKEND_PORT: "5000"
  
  # Frontend
  REACT_APP_API_URL: "http://backend-service:5000"

# INSTRUCTIONS :
# 1. Remplacez VOTRE_BUCKET_S3 par le nom de votre bucket S3
#    Exemple : ecommerce-products-2025-nouveau-compte
#
# 2. Appliquer :
#    kubectl apply -f k8s/configmaps/app-config.yaml