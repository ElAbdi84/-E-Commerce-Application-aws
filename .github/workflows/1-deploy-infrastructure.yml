# ============================================================================
# WORKFLOW 1 : DÉPLOIEMENT COMPLET DE L'INFRASTRUCTURE
# ============================================================================
# 
# Ce workflow déploie TOUT from scratch :
#   - Infrastructure AWS (Terraform Phase 1)
#   - Ressources Kubernetes (Terraform Phase 2)
#   - Images Docker (Backend + Frontend)
#   - Applications sur EKS
#   - Base de données
#
# Durée : 15-20 minutes
# ============================================================================

name: 1️⃣ Deploy Infrastructure (Complete)

on:
  # Déclenchement manuel uniquement (pour contrôle total)
  workflow_dispatch:
    inputs:
      skip_terraform:
        description: 'Skip Terraform (si infra existe déjà)'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ecommerce-cluster
  TF_VERSION: 1.7.0

jobs:
  # ===========================================================================
  # JOB 1 : TERRAFORM PHASE 1 - INFRASTRUCTURE AWS
  # ===========================================================================
  terraform-phase1:
    name: 🏗️ Terraform Phase 1 - AWS Infrastructure
    runs-on: ubuntu-latest
    if: inputs.skip_terraform != true
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 📦 Terraform Init (Phase 1)
      run: |
        cd terraform
        terraform init

    - name: 📋 Terraform Plan (Phase 1)
      env:
        TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
        TF_VAR_s3_bucket_name: ${{ secrets.TF_VAR_s3_bucket_name }}
        TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
        TF_VAR_aws_access_key_id: ${{ secrets.TF_VAR_aws_access_key_id }}
        TF_VAR_aws_secret_access_key: ${{ secrets.TF_VAR_aws_secret_access_key }}
      run: |
        cd terraform
        terraform plan -out=tfplan

    - name: 🚀 Terraform Apply (Phase 1)
      env:
        TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
        TF_VAR_s3_bucket_name: ${{ secrets.TF_VAR_s3_bucket_name }}
        TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
        TF_VAR_aws_access_key_id: ${{ secrets.TF_VAR_aws_access_key_id }}
        TF_VAR_aws_secret_access_key: ${{ secrets.TF_VAR_aws_secret_access_key }}
      run: |
        cd terraform
        terraform apply -auto-approve tfplan
        
        echo "✅ Phase 1 terminée - Infrastructure AWS créée"

    - name: ⏰ Wait for EKS to be fully ready
      run: |
        echo "⏳ Attendre que le cluster EKS soit complètement opérationnel..."
        sleep 120

  # ===========================================================================
  # JOB 2 : TERRAFORM PHASE 2 - RESSOURCES KUBERNETES
  # ===========================================================================
  terraform-phase2:
    name: ☸️ Terraform Phase 2 - Kubernetes Resources
    runs-on: ubuntu-latest
    needs: terraform-phase1
    if: always() && (needs.terraform-phase1.result == 'success' || inputs.skip_terraform == true)
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: ⚙️ Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
        kubectl get nodes

    - name: 📦 Terraform Init (Phase 2)
      run: |
        cd terraform-k8s
        terraform init

    - name: 📋 Terraform Plan (Phase 2)
      run: |
        cd terraform-k8s
        terraform plan -out=tfplan

    - name: 🚀 Terraform Apply (Phase 2)
      run: |
        cd terraform-k8s
        terraform apply -auto-approve tfplan
        
        echo "✅ Phase 2 terminée - Ressources Kubernetes créées"

    - name: ⏰ Wait for Kubernetes resources
      run: |
        echo "⏳ Attendre que les ressources Kubernetes soient prêtes..."
        sleep 60

  # ===========================================================================
  # JOB 3 : BUILD DOCKER IMAGES
  # ===========================================================================
  build-images:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: terraform-phase2
    if: always()
    
    strategy:
      matrix:
        service: [backend, frontend]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 🔐 Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: 🐳 Build and Push ${{ matrix.service }}
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd ${{ matrix.service }}
        
        echo "📦 Building ${{ matrix.service }}..."
        docker build -t $ECR_REGISTRY/ecommerce-${{ matrix.service }}:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/ecommerce-${{ matrix.service }}:$IMAGE_TAG \
                   $ECR_REGISTRY/ecommerce-${{ matrix.service }}:latest
        
        echo "📤 Pushing to ECR..."
        docker push $ECR_REGISTRY/ecommerce-${{ matrix.service }}:$IMAGE_TAG
        docker push $ECR_REGISTRY/ecommerce-${{ matrix.service }}:latest
        
        echo "✅ ${{ matrix.service }} image pushed successfully"

  # ===========================================================================
  # JOB 4 : DEPLOY APPLICATIONS
  # ===========================================================================
  deploy-apps:
    name: 🚀 Deploy Applications to EKS
    runs-on: ubuntu-latest
    needs: build-images
    if: always()
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 🔐 Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: ⚙️ Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: 🚀 Deploy Backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🚀 Deploying Backend..."
        kubectl set image deployment/backend-deployment \
          backend=$ECR_REGISTRY/ecommerce-backend:$IMAGE_TAG --record
        
        kubectl rollout status deployment/backend-deployment --timeout=5m
        echo "✅ Backend deployed"

    - name: 🚀 Deploy Frontend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🚀 Deploying Frontend..."
        kubectl set image deployment/frontend-deployment \
          frontend=$ECR_REGISTRY/ecommerce-frontend:$IMAGE_TAG --record
        
        kubectl rollout status deployment/frontend-deployment --timeout=5m
        echo "✅ Frontend deployed"

    - name: ⏰ Wait for pods to be ready
      run: |
        echo "⏳ Attendre que tous les pods soient prêts..."
        kubectl wait --for=condition=ready pod -l app=backend --timeout=3m
        kubectl wait --for=condition=ready pod -l app=frontend --timeout=3m

  # ===========================================================================
  # JOB 5 : INITIALIZE DATABASE
  # ===========================================================================
  init-database:
    name: 🗄️ Initialize Database
    runs-on: ubuntu-latest
    needs: deploy-apps
    if: always()
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: ⚙️ Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: 🗄️ Run Database Initialization
      run: |
        echo "🗄️ Initializing database..."
        
        # Attendre que Backend soit stable
        sleep 30
        
        # Copier et exécuter init-db.js
        BACKEND_POD=$(kubectl get pod -l app=backend -o jsonpath='{.items[0].metadata.name}')
        
        kubectl cp backend/init-db.js $BACKEND_POD:/app/init-db.js
        kubectl exec $BACKEND_POD -- node init-db.js || echo "⚠️ Database might already be initialized"
        
        echo "✅ Database initialization complete"

  # ===========================================================================
  # JOB 6 : VERIFICATION & OUTPUT
  # ===========================================================================
  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: init-database
    if: always()
    
    steps:
    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: ⚙️ Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: 📊 Display Deployment Status
      run: |
        echo "================================================"
        echo "🎉 DÉPLOIEMENT COMPLET RÉUSSI !"
        echo "================================================"
        echo ""
        echo "📦 PODS:"
        kubectl get pods
        echo ""
        echo "🌐 SERVICES:"
        kubectl get svc
        echo ""
        echo "🔗 INGRESS:"
        kubectl get ingress
        echo ""
        echo "📈 HPA (Auto-scaling):"
        kubectl get hpa
        echo ""
        echo "================================================"
        echo "🌍 URL DE L'APPLICATION:"
        kubectl get ingress ecommerce-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
        echo ""
        echo "================================================"

    - name: 🔍 Health Check
      run: |
        echo "🔍 Vérification de la santé des services..."
        
        BACKEND_POD=$(kubectl get pod -l app=backend -o jsonpath='{.items[0].metadata.name}')
        
        echo "Backend health:"
        kubectl exec $BACKEND_POD -- wget -qO- http://localhost:5000/api/health || echo "⚠️ Backend starting..."
        
        echo ""
        echo "✅ Déploiement vérifié et opérationnel !"