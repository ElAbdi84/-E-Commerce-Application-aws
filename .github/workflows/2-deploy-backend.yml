# ============================================================================
# WORKFLOW : DÉPLOIEMENT BACKEND AVEC TESTS
# ============================================================================
# 
# Ce workflow teste et déploie le Backend sur l'infrastructure EKS
# 
# Prérequis : Infrastructure déjà déployée avec deploy-infra.sh
# 
# Déclenché automatiquement sur :
#   - Push sur main avec changements dans backend/
#   - Pull Request vers main
#
# Durée : 4-5 minutes
# ============================================================================

name: 🐳 Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ecommerce-backend
  EKS_CLUSTER_NAME: ecommerce-pfe-elabdi-cluster
  DEPLOYMENT_NAME: backend-deployment

jobs:
  # ==========================================================================
  # JOB 1 : TESTS ET QUALITÉ CODE
  # ==========================================================================
  test:
    name: 🧪 Tests & Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    # ========================================================================
    # ÉTAPE 1 : CHECKOUT CODE
    # ========================================================================
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # ========================================================================
    # ÉTAPE 2 : SETUP NODE.JS
    # ========================================================================
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    # ========================================================================
    # ÉTAPE 3 : INSTALL DEPENDENCIES
    # ========================================================================
    - name: 📚 Install dependencies
      working-directory: backend
      run: |
        echo "📦 Installing Backend dependencies..."
        npm ci
        echo "✅ Dependencies installed"

    # ========================================================================
    # ÉTAPE 4 : LINTING (Vérification code)
    # ========================================================================
    - name: 🔍 Run ESLint
      working-directory: backend
      run: |
        echo "🔍 Running ESLint..."
        npx eslint . --ext .js --max-warnings 0 || echo "⚠️ ESLint warnings found (non-blocking)"
        echo "✅ Linting complete"
      continue-on-error: true

    # ========================================================================
    # ÉTAPE 5 : UNIT TESTS
    # ========================================================================
    - name: 🧪 Run Unit Tests
      working-directory: backend
      run: |
        echo "🧪 Running unit tests..."
        npm test -- --coverage --passWithNoTests
        echo "✅ Tests passed!"

    # ========================================================================
    # ÉTAPE 6 : CODE COVERAGE
    # ========================================================================
    - name: 📊 Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        files: backend/coverage/lcov.info
        flags: backend
        name: backend-coverage
      continue-on-error: true

    # ========================================================================
    # ÉTAPE 7 : SECURITY AUDIT
    # ========================================================================
    - name: 🔒 Run Security Audit
      working-directory: backend
      run: |
        echo "🔒 Running npm audit..."
        npm audit --audit-level=moderate || echo "⚠️ Security vulnerabilities found (review required)"
        echo "✅ Security audit complete"
      continue-on-error: true

  # ==========================================================================
  # JOB 2 : BUILD & DEPLOY (si tests passent)
  # ==========================================================================
  deploy:
    name: 🚀 Build & Deploy Backend
    runs-on: ubuntu-latest
    needs: test  # ✅ Attend que les tests passent
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    # ========================================================================
    # ÉTAPE 1 : CHECKOUT CODE
    # ========================================================================
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # ========================================================================
    # ÉTAPE 2 : CONFIGURE AWS
    # ========================================================================
    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ========================================================================
    # ÉTAPE 3 : LOGIN ECR
    # ========================================================================
    - name: 🔐 Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # ========================================================================
    # ÉTAPE 4 : BUILD & PUSH DOCKER IMAGE
    # ========================================================================
    - name: 🐳 Build, tag, and push Backend image
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd backend
        
        echo "📦 Building Backend Docker image..."
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        
        echo "🏷️ Tagging as latest..."
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                   $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        echo "📤 Pushing to ECR..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        echo "✅ Backend image pushed successfully"
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # ========================================================================
    # ÉTAPE 5 : UPDATE KUBECONFIG
    # ========================================================================
    - name: ⚙️ Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER_NAME }} \
          --region ${{ env.AWS_REGION }}

    # ========================================================================
    # ÉTAPE 6 : DEPLOY TO EKS
    # ========================================================================
    - name: 🚀 Deploy Backend to EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🚀 Updating Backend deployment..."
        
        kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
          backend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --record
        
        echo "⏳ Waiting for rollout to complete..."
        kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=5m
        
        echo "✅ Backend deployment successful!"

    # ========================================================================
    # ÉTAPE 7 : VERIFY DEPLOYMENT
    # ========================================================================
    - name: ✅ Verify Backend deployment
      run: |
        echo "📊 Checking Backend pods..."
        kubectl get pods -l app=backend
        
        echo ""
        echo "🔍 Waiting for pods to be ready..."
        kubectl wait --for=condition=ready pod -l app=backend --timeout=2m
        
        echo ""
        echo "✅ Backend is running and healthy!"

    # ========================================================================
    # ÉTAPE 8 : SMOKE TESTS (Tests post-déploiement)
    # ========================================================================
    - name: 🔥 Run Smoke Tests
      run: |
        echo "🔥 Running smoke tests..."
        
        # Récupérer URL application
        APP_URL=$(kubectl get ingress ecommerce-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        
        # Test 1: Health check
        echo "Test 1: Health check..."
        curl -f http://$APP_URL/api/health || exit 1
        echo "✅ Health check passed"
        
        # Test 2: Products endpoint
        echo "Test 2: Products endpoint..."
        curl -f http://$APP_URL/api/products || exit 1
        echo "✅ Products endpoint working"
        
        echo "✅ All smoke tests passed!"
      continue-on-error: true

    # ========================================================================
    # ÉTAPE 9 : ROLLBACK ON FAILURE
    # ========================================================================
    - name: ❌ Rollback on failure
      if: failure()
      run: |
        echo "⚠️ Deployment failed! Rolling back to previous version..."
        kubectl rollout undo deployment/${{ env.DEPLOYMENT_NAME }}
        kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }}
        echo "✅ Rollback complete"

  